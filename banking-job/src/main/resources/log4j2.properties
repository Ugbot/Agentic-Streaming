# Logging for the standalone banking Flink job (banking-job.jar). The core module ships a
# log4j2.properties with rootLogger.level = NONE (correct on a Flink cluster, where Flink supplies
# logging) — but that file gets shaded into this uber-jar and would silence everything. This
# job-local config takes precedence in the shaded jar and restores console logging at INFO so the
# embedded MiniCluster job is debuggable.
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

# Our code at DEBUG, but keep Flink/Kafka/Netty chatter down.
logger.agentic.name = org.agentic.flink
logger.agentic.level = DEBUG
logger.flink.name = org.apache.flink
logger.flink.level = WARN
logger.kafka.name = org.apache.kafka
logger.kafka.level = ERROR

appender.console.name = ConsoleAppender
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss,SSS} %-5p %-50c{1} - %m%n

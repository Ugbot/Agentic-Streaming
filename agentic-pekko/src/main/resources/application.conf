# Agentic Pekko — local single-node profile (the default for Main + dev).
# Cluster + JDBC/Cassandra/Redis profiles arrive in later phases as application-*.conf.
pekko {
  loglevel = "INFO"

  actor {
    provider = "local"
    # Every actor message/event/state crossing the wire or a journal uses jackson-cbor,
    # never Java serialization. (Not exercised under provider=local + inmem journal, but
    # declared so the cluster/persistence profiles inherit it.)
    serialization-bindings {
      "org.jagentic.pekko.serialization.CborSerializable" = jackson-cbor
    }
  }

  persistence {
    # Event-sourced conversation entities. Dev/local uses the in-memory journal; the
    # postgres/cassandra profiles swap journal.plugin (see later phases).
    journal.plugin = "pekko.persistence.journal.inmem"
    snapshot-store.plugin = "pekko.persistence.snapshot-store.local"
    snapshot-store.local.dir = "target/pekko-snapshots"
  }
}

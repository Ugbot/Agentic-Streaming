# Cluster + Cassandra (event-sourced via pekko-persistence-cassandra).
# Run with: -Dconfig.resource=application-cluster-cassandra.conf
include "application.conf"

pekko {
  actor.provider = "cluster"
  cluster.seed-nodes = ["pekko://AgenticPekko@127.0.0.1:25520"]

  persistence {
    journal.plugin = "pekko.persistence.cassandra.journal"
    snapshot-store.plugin = "pekko.persistence.cassandra.snapshot"
  }
}

pekko.persistence.cassandra {
  journal.keyspace-autocreate = true
  journal.tables-autocreate = true
  snapshot.keyspace-autocreate = true
  snapshot.tables-autocreate = true
}

datastax-java-driver.basic.contact-points = ["127.0.0.1:9042"]
datastax-java-driver.basic.load-balancing-policy.local-datacenter = "datacenter1"

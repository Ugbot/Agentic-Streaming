# Cluster + Postgres (event-sourced via pekko-persistence-jdbc).
# Run with: -Dconfig.resource=application-cluster-jdbc.conf  (DDL: pekko-persistence-jdbc schema)
include "application.conf"

pekko {
  actor.provider = "cluster"
  remote.artery.canonical {
    hostname = ${?AGENTIC_PEKKO_HOST}
    port = ${?AGENTIC_PEKKO_PORT}
  }
  cluster.seed-nodes = ["pekko://AgenticPekko@127.0.0.1:25520"]

  persistence {
    journal.plugin = "jdbc-journal"
    snapshot-store.plugin = "jdbc-snapshot-store"
  }
}

jdbc-journal.use-shared-db = "default"
jdbc-snapshot-store.use-shared-db = "default"
jdbc-durable-state-store.use-shared-db = "default"

pekko.persistence.jdbc.shared-databases.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    url = ${?AGENTIC_PG_URL}      # e.g. jdbc:postgresql://localhost:5434/agentic
    user = ${?AGENTIC_PG_USER}
    password = ${?AGENTIC_PG_PASSWORD}
    driver = "org.postgresql.Driver"
    numThreads = 8
  }
}

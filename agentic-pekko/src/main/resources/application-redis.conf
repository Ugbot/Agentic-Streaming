# Redis (write-through) durability — the entity is NOT event-sourced; the transcript lives in
# Redis via jagentic-core's RedisConversationStore. Boot with:
#   new PekkoSystem(deps, DurabilityProfile.REDIS, System.getenv("AGENTIC_REDIS_URL"))
# Run with: -Dconfig.resource=application-redis.conf
include "application.conf"

pekko.actor.provider = "cluster"
pekko.cluster.seed-nodes = ["pekko://AgenticPekko@127.0.0.1:25520"]

# No persistence journal — durability is the write-through Redis store.
agentic-pekko.durability = "redis"
agentic-pekko.redis-url = ${?AGENTIC_REDIS_URL}    # e.g. redis://localhost:6379

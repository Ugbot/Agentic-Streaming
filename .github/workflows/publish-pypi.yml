name: Publish Python package to PyPI

# Fires on every published GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored in this repo.
# Configure the trusted publisher once on https://pypi.org/manage/account/publishing/
# (project: agentic-flink, owner: Ugbot, repo: Agentic-Flink, workflow: publish-pypi.yml,
#  environment: pypi).

on:
  release:
    types: [published]
  # Manual fallback. Lets you re-publish without cutting a new GitHub Release
  # (e.g. if the upload step failed but the artifacts are fine).
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        working-directory: python
        run: python -m build

      - name: Run twine check
        working-directory: python
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing requires this environment to exist on the repo and
    # to be selected on the PyPI publisher config.
    environment:
      name: pypi
      url: https://pypi.org/p/agentic-flink
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # print-hash: makes the publish log show the wheel SHA256 — handy for
          # cross-checking against the PyPI page later.
          print-hash: true

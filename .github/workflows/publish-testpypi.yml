name: Publish Python package to TestPyPI

# Manual dispatch only — use this to rehearse a release on TestPyPI before the
# real one. Trusted Publishing must be configured separately on test.pypi.org.
# (project: agentic-flink, owner: Ugbot, repo: Agentic-Flink, workflow:
#  publish-testpypi.yml, environment: testpypi).

on:
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        working-directory: python
        run: python -m build

      - name: Run twine check
        working-directory: python
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-test
          path: python/dist/*
          if-no-files-found: error

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agentic-flink
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-test
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

# Agentic Tool Services — app config. Every external/transport setting is a connection link
# resolvable from the environment, so the service is hot-swappable per deployment.

# Which packs to serve (CSV); empty = all available packs.
tools.packs=${TOOL_PACKS:}
tools.server.name=agentic-tool-services
tools.server.version=0.1.0

# HTTP port for MCP-HTTP (POST /mcp), REST (/tools), and OpenAPI (/q/openapi).
quarkus.http.port=${TOOL_SERVICES_PORT:8081}

# OpenAPI / Swagger UI metadata.
quarkus.smallrye-openapi.info-title=Agentic Tool Services
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.swagger-ui.always-include=true

# gRPC transport (ToolService). Ride the single HTTP server rather than the dedicated gRPC port
# (9000) — one port to expose, and @QuarkusTest @GrpcClient stubs reach it on the test HTTP port.
quarkus.grpc.server.use-separate-server=false

# --- Async pub-sub bridges: OFF by default ---
# Both the Kafka and Redis bridges are build-time gated and disabled here. No mp.messaging.*
# channel config is present, so even if enabled the connector would need explicit wiring — the
# default boot never reaches a broker. To turn them on:
#   Kafka: -Dtools.kafka.enabled=true plus the channel props in application-kafka.properties
#   Redis: -Dtools.redis.enabled=true (URL/channels from tools.redis.* config, defaults to localhost)
tools.kafka.enabled=false
tools.redis.enabled=false

# The quarkus-messaging-kafka extension would otherwise auto-start a Kafka Dev Service
# (a redpanda container) in dev/test. Disable it so the default boot and @QuarkusTest run with
# no broker and no container runtime — the Kafka bridge is opt-in via tools.kafka.enabled.
quarkus.kafka.devservices.enabled=false

# Example Kafka channel config for the async pub-sub bridge (KafkaToolBridge).
#
# This profile is NOT active by default. To run the Kafka bridge:
#   mvn quarkus:dev -Dquarkus.profile=kafka -Dtools.kafka.enabled=true
# or at package/run time set the same two flags. The build-time gate (tools.kafka.enabled=true)
# wires the bean in; these mp.messaging.* props point its channels at a broker.
#
# Request  on topic 'tool-requests': {"id":"...","tool":"util_add","args":{"a":40,"b":2}}
# Result   on topic 'tool-results' : {"id":"...","ok":true,"result":42.0}

kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Inbound: tool invocation requests.
mp.messaging.incoming.tool-requests.connector=smallrye-kafka
mp.messaging.incoming.tool-requests.topic=tool-requests
mp.messaging.incoming.tool-requests.group.id=agentic-tool-services
mp.messaging.incoming.tool-requests.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.tool-requests.auto.offset.reset=earliest

# Outbound: tool results, correlated to the request by 'id'.
mp.messaging.outgoing.tool-results.connector=smallrye-kafka
mp.messaging.outgoing.tool-results.topic=tool-results
mp.messaging.outgoing.tool-results.value.serializer=org.apache.kafka.common.serialization.StringSerializer

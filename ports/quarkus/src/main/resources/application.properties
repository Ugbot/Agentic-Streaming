# --- Kafka broker ---
kafka.bootstrap.servers=localhost:9092

# --- Inbound: the streaming agent consumes turn requests ---
# Keyed by conversationId => one partition = one consumer = single writer (C2).
mp.messaging.incoming.requests.connector=smallrye-kafka
mp.messaging.incoming.requests.topic=agent.requests
mp.messaging.incoming.requests.group.id=agentic-quarkus
mp.messaging.incoming.requests.value.deserializer=io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
mp.messaging.incoming.requests.apicurio.registry.auto-register=false
# One in-flight record per partition keeps per-conversation processing in order.
mp.messaging.incoming.requests.max.poll.records=1

# --- Outbound: the verified reply, correlated by conversationId ---
mp.messaging.outgoing.replies.connector=smallrye-kafka
mp.messaging.outgoing.replies.topic=agent.replies
mp.messaging.outgoing.replies.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
# Partition replies by conversationId so the same single-writer invariant holds downstream.
mp.messaging.outgoing.replies.key.serializer=org.apache.kafka.common.serialization.StringSerializer

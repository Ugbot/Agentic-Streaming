# Local single-node config for the runnable LocalDemo (no cluster). The sharded
# production path (BankingSharding) instead needs:
#   pekko.actor.provider = cluster
#   pekko.remote.artery.canonical { hostname, port }
#   pekko.cluster.seed-nodes = [ ... ]
# and a Jackson serialization binding for ConversationActor.Command/Reply.
pekko {
  loglevel = "WARNING"
  actor.provider = "local"
}

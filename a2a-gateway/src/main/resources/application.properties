# Agentic Flink A2A Gateway — Quarkus configuration.
#
# HTTP port for the JSON-RPC + SSE binding (the Agent Card is served at
# /.well-known/agent-card.json). Override at runtime with QUARKUS_HTTP_PORT.
quarkus.http.port=9999
quarkus.http.host=0.0.0.0

quarkus.application.name=agentic-flink-a2a-gateway

# The A2A wire is served by our own JAX-RS A2AResource (spec message/send); the bridge connector
# (BridgeProducer) is injected into it. Keep beans even if ARC's analysis thinks them unused.
quarkus.arc.remove-unused-beans=false
quarkus.log.level=INFO
quarkus.log.category."org.agentic.flink.a2a".level=DEBUG

# Gateway identity + bridge transport are read from AgenticFlinkConfig
# (AGENTIC_FLINK_* env vars / system props). Key examples:
#   AGENTIC_FLINK_A2A_GATEWAY_PUBLIC_URL=https://my-host:9999
#   AGENTIC_FLINK_A2A_BRIDGE_TRANSPORT=zeromq            # inproc | zeromq | redis
#   AGENTIC_FLINK_A2A_BRIDGE_REQUEST_ENDPOINT=tcp://127.0.0.1:5760
#   AGENTIC_FLINK_A2A_BRIDGE_RESPONSE_ENDPOINT=tcp://127.0.0.1:5761
#   AGENTIC_FLINK_A2A_GATEWAY_AGENT_NAME=My Flink Agent
#   AGENTIC_FLINK_A2A_GATEWAY_AGENT_SKILLS=route:Router:Plans routes,quote:Quoter:Prices items

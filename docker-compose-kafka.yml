# Optional Kafka overlay for the content-moderation example.
#
# Boot together with the base compose:
#   docker compose -f docker-compose.yml -f docker-compose-kafka.yml up -d
#
# Produces a single-broker Kafka + a Zookeeper, with the broker advertised on
# the host network at localhost:9092. Adequate for local development; not a
# production layout.

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: agentic-flink-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - agentic-flink-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: agentic-flink-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - agentic-flink-network

networks:
  agentic-flink-network:
    external: true
